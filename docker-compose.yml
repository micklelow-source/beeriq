# BrewIQ local stack. Postgres ships with PostGIS ready for the route planner
# (spec §7). Redis backs Celery / caching in later phases.
name: brewiq

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: brewiq
      POSTGRES_PASSWORD: brewiq
      POSTGRES_DB: brewiq
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brewiq"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
    environment:
      BREWIQ_ENV: development
      BREWIQ_DATABASE_URL: postgresql+asyncpg://brewiq:brewiq@db:5432/brewiq
      BREWIQ_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  db_data:
